server {
    listen 80;
    server_name _;

    client_max_body_size 20m;

    # Campus allowlist snippet (recommended)
    # Copy example to /etc/nginx/snippets/retropro-campus-allowlist.conf and edit CIDRs.
    include /etc/nginx/snippets/retropro-campus-allowlist.conf;

    # Temporary fallback: if campus CIDRs are not ready, comment out the include above,
    # then enable basic auth below.
    # auth_basic "RetroPRO Restricted";
    # auth_basic_user_file /etc/nginx/.htpasswd_retropro;

    location / {
        proxy_pass http://127.0.0.1:18100;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_connect_timeout 30s;
        proxy_send_timeout 600s;
        proxy_read_timeout 600s;
    }
}
